name: Deploy to Staging (fly.io)

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Ensure staging DB is running
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          DB_APP="vatch-staging-db"
          MACHINE_ID=$(flyctl machine list -a "$DB_APP" --json | jq -r '.[0].id')
          STATE=$(flyctl machine list -a "$DB_APP" --json | jq -r '.[0].state')
          echo "DB machine $MACHINE_ID: state=$STATE"
          if [ "$STATE" = "stopped" ]; then
            echo "DB stopped → starting..."
            flyctl machine start "$MACHINE_ID" -a "$DB_APP"
            flyctl machine wait "$MACHINE_ID" -a "$DB_APP" --state started --wait-timeout 60s
          fi
          echo "Waiting for PostgreSQL to accept connections..."
          for i in $(seq 1 24); do
            if flyctl ssh console -a "$DB_APP" -C "pg_isready -h localhost -U postgres" 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            if [ "$i" = "24" ]; then
              echo "PostgreSQL did not become ready in time"
              exit 1
            fi
            echo "  attempt $i/24, retrying in 5s..."
            sleep 5
          done

      - run: flyctl deploy --remote-only --app vatch-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Seed staging database
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          APP="vatch-staging"
          MACHINE_ID=$(flyctl machine list -a "$APP" --json | jq -r '.[0].id')
          STATE=$(flyctl machine list -a "$APP" --json | jq -r '.[0].state')
          echo "App machine $MACHINE_ID: state=$STATE"
          if [ "$STATE" = "stopped" ] || [ "$STATE" = "created" ]; then
            echo "App machine stopped → starting..."
            flyctl machine start "$MACHINE_ID" -a "$APP"
          fi
          echo "Waiting for machine to be started..."
          flyctl machine wait "$MACHINE_ID" -a "$APP" --state started --wait-timeout 120s
          flyctl ssh console -a "$APP" -C "node node_modules/prisma/build/index.js db seed"
